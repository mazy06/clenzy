# ===========================================
# Clenzy — CI/CD Backend (Spring Boot + Java 21)
# ===========================================
# Flux :
#   - push main/develop  → CI (tests + build) + push image GHCR
#   - push production    → CI + push image GHCR (:latest) + déclenchement déploiement via clenzy-infra
#   - PR main/develop    → CI uniquement (pas de push)
#   - PR production      → CI + tests de performance/charge (gate obligatoire)
#
# IMPORTANT : Les merges vers production ne sont autorisées que via Pull Request.
# Le push direct sur production est bloqué par le pre-push hook + branch protection rules.

name: CI Backend

# NOTE : un commit VIDE sur production ne declenche PAS ce workflow (filtres paths).
# Pour rejouer un deploy dont le run est mort (ex. budget Actions epuise, 2026-07-21),
# toucher ce fichier ou server/** dans le commit de relance.
on:
  push:
    branches: [main, develop, production]
    paths:
      - 'server/**'
      - 'pom.xml'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main, develop, production]
    paths:
      - 'server/**'
      - 'pom.xml'
      - '.github/workflows/ci-backend.yml'

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/clenzy-server

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      coverage_pct: ${{ steps.coverage.outputs.pct }}

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: clenzy_test
          POSTGRES_USER: clenzy_test
          POSTGRES_PASSWORD: clenzy_test_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build & Run Tests
        working-directory: server
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/clenzy_test
          SPRING_DATASOURCE_USERNAME: clenzy_test
          SPRING_DATASOURCE_PASSWORD: clenzy_test_ci
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
          # Testcontainers : desactiver Ryuk (nettoyage) en CI (containers supprimes par le runner)
          TESTCONTAINERS_RYUK_DISABLED: true
        run: mvn clean verify jacoco:report -B -q

      - name: Extract test coverage percentage
        id: coverage
        working-directory: server
        run: |
          COVERAGE=$(awk -F',' 'NR>1{im+=$4; ic+=$5}END{total=im+ic; if(total>0) printf "%.1f", (ic/total)*100; else print "0"}' target/site/jacoco/jacoco.csv)
          echo "pct=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Test coverage: ${COVERAGE}%"

      - name: Upload test results
        if: always()
        # L'upload d'artefacts ne doit JAMAIS bloquer le build/deploy : un quota
        # d'artefacts GitHub atteint ("Artifact storage quota has been hit") faisait
        # echouer tout le job et skippait le deploy alors que les tests passaient.
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: server/target/surefire-reports/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # Audit 2026-07 F7-01 : gate SCA BLOQUANT (avant : failBuildOnCVSS=9 + `|| true`
      # + continue-on-error => jamais bloquant). Bloque désormais sur CVSS >= 7 (aligné
      # sur pom.xml). Le fichier de suppression du pom (src/main/resources/owasp-
      # suppressions.xml) s'applique — plus de référence à un fichier inexistant.
      # NB : pour fiabiliser le téléchargement NVD, ajouter un secret NVD_API_KEY et le
      # passer via `-DnvdApiKey` (env NVD_API_KEY) si le rate-limit NVD pose problème.
      - name: OWASP Dependency Check
        working-directory: server
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          # -DfailBuildOnCVSS=7 : bloque sur une vraie CVE (>= 7) quand les données NVD sont dispo.
          # -DfailOnError=false : tolère un echec d'infrastructure (NVD 403/rate-limit sans clé API) —
          #   sans donnees, aucun finding => le step passe (pas de faux rouge), au lieu de casser le CI.
          # NVD_API_KEY (secret optionnel) : fiabilise l'update NVD ; sans lui, le NVD 403 souvent.
          mvn dependency-check:check -B -q \
            -DfailBuildOnCVSS=7 \
            -DfailOnError=false \
            ${NVD_API_KEY:+-DnvdApiKey=$NVD_API_KEY}

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: server/target/dependency-check-report.html
          retention-days: 30

  security-checks:
    name: Security Code Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for System.out.println
        run: |
          echo "=== Checking for System.out.println in source code ==="
          MATCHES=$(grep -rn 'System\.out\.println\|System\.err\.println\|\.printStackTrace()' \
            server/src/main/java/ --include='*.java' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Found System.out.println or printStackTrace() in source code:"
            echo "$MATCHES"
            exit 1
          fi
          echo "No System.out.println or printStackTrace() found"

      - name: Check for hardcoded credentials
        run: |
          echo "=== Checking for hardcoded credentials ==="
          MATCHES=$(grep -rniE 'password\s*=\s*"[^"$]+"|secret\s*=\s*"[^"$]+"' \
            server/src/main/java/ \
            --include='*.java' || true)
          FILTERED=$(echo "$MATCHES" | grep -v '^\s*$' | grep -v '//' || true)
          if [ -n "$FILTERED" ]; then
            echo "::warning::Potential hardcoded credentials found (review manually):"
            echo "$FILTERED"
          fi
          echo "Hardcoded credentials check complete"

      - name: Check for missing PreAuthorize on controllers
        run: |
          echo "=== Checking controllers for PreAuthorize ==="
          MISSING=""
          for f in $(find server/src/main/java -name '*Controller.java' \
            -not -name 'AuthProxyController.java' -not -name 'AuthController.java' \
            -not -name 'CaptchaController.java'); do
            if ! grep -q '@PreAuthorize' "$f"; then
              MISSING="$MISSING $f"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::warning::Controllers without PreAuthorize annotation: $MISSING"
          fi
          echo "PreAuthorize check complete"

  docker-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/production')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # L'image moby/buildkit est tiree par defaut de Docker Hub (registry-1.docker.io),
      # qui timeout par intermittence depuis les runners GitHub (flake recurrent).
      # On tente d'abord le mirror GCR, puis repli sur Docker Hub si indisponible.
      - name: Set up Docker Buildx (mirror GCR)
        id: buildx-mirror
        continue-on-error: true
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=mirror.gcr.io/moby/buildkit:buildx-stable-1

      - name: Set up Docker Buildx (fallback Docker Hub)
        if: steps.buildx-mirror.outcome == 'failure'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/production' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: server
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            KPI_TEST_COVERAGE_PCT=${{ needs.build-and-test.outputs.coverage_pct }}

  deploy:
    name: Trigger deploy via clenzy-infra
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/production'
    env:
      INFRA_REPOSITORY: ${{ vars.INFRA_REPOSITORY || format('{0}/clenzy-infra', github.repository_owner) }}

    steps:
      - name: Validate dispatch configuration
        run: |
          if [ -z "${{ secrets.INFRA_REPO_DISPATCH_TOKEN }}" ]; then
            echo "::error::Missing INFRA_REPO_DISPATCH_TOKEN secret. Add a token that can trigger workflows on ${INFRA_REPOSITORY}."
            exit 1
          fi
          if [ -z "${INFRA_REPOSITORY}" ]; then
            echo "::error::Missing INFRA_REPOSITORY variable."
            exit 1
          fi

      - name: Trigger infra deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_DISPATCH_TOKEN }}
          repository: ${{ env.INFRA_REPOSITORY }}
          event-type: deploy-clenzy-backend
          client-payload: >-
            {
              "service": "pms-server",
              "environment": "production",
              "image": "ghcr.io/${{ env.IMAGE_NAME }}:latest",
              "source_repo": "${{ github.repository }}",
              "source_ref": "${{ github.ref }}",
              "source_sha": "${{ github.sha }}"
            }
