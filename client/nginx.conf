server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ─── Assets hashes par Vite (filename.HASH.ext) ────────────────────────────
  # Le hash dans le filename garantit qu'un nouveau build = nouveau filename ;
  # on peut donc cacher 1 an + immutable sans risque d'obsolescence.
  location ~* \.(?:js|mjs|css|woff2?|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    access_log off;
    try_files $uri =404;
  }

  # ─── Images / icones ───────────────────────────────────────────────────────
  # Pas hashees, on cache 7 jours.
  location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
    access_log off;
    try_files $uri =404;
  }

  # ─── SPA fallback : index.html + routes virtuelles ─────────────────────────
  # CRITIQUE : pas de cache sur le HTML, sinon apres un deploy le browser
  # continue de charger l'ancien index.html (qui pointe vers d'anciens chunks
  # JS hashes qui n'existent plus) → ecran blanc ou bug d'integration. Le
  # no-cache force le browser a revalider a chaque navigation.
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_types text/plain application/javascript text/css application/json image/svg+xml;
}
