    <!-- Favicon tab browser : SVG vectoriel (mark 8 nodes orchestration sur
         tile brand). Note : avant ce link manquait => le navigateur tombait
         sur /favicon.ico (inexistant) et affichait l'icone par defaut, d'ou
         l'absence du logo Clenzy dans l'onglet. -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Plus Jakarta Sans : body/UI principal (humaniste, B2B-ready, terminaisons rondes).
         Inter conservé pour les surfaces legacy + fallback.
         Cormorant Garamond / Playfair Display : serifs pour les éléments éditoriaux (booking engine landing). -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <!-- Space Grotesk : font du wordmark Clenzy (ClenzyMarkLogo).
         Plus geometrique + plus caractere que Jakarta, ideal AI/tech-startup
         per ui-ux-pro-max. Weights 500/600/700 utilises pour l'icone + le mark. -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Tajawal : police arabe moderne pour les reponses assistant + UI quand
         contenu majoritairement arabe. Subset arabic+latin pour ~30KB. -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
