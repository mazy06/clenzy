# Active la decouverte automatique des extensions JUnit 5 via le SPI
# (META-INF/services/org.junit.jupiter.api.extension.Extension). Cette
# config s'applique a TOUS les tests du module — pas besoin d'annoter
# chaque classe avec @ExtendWith.
#
# Extension cle activee globalement par ce flag :
#   - com.clenzy.tenant.TenantContextExtension : clear() le ThreadLocal
#     du TenantContext avant ET apres chaque test, pour eliminer les
#     fuites cross-tests via le pool surefire (cf. JavaDoc de l'extension
#     et incident PR #159 CheckInInstructionsControllerTest).
junit.jupiter.extensions.autodetection.enabled = true
