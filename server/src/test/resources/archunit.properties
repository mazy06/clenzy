# Configuration du gel des regles ArchUnit (FreezingArchRule).
# Le store liste les violations HISTORIQUES tolerees (dette gelee, audit T-ARCH-01) :
# - une nouvelle violation (absente du store) fait echouer le build ;
# - une violation corrigee est automatiquement retiree du store au run suivant.
# Chemin relatif au working dir de Surefire (= server/). Le store est versionne.
freeze.store.default.path=archunit_store
freeze.store.default.allowStoreCreation=true
