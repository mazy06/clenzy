  # --- 0112a : Tag pre-fix-status-constraint ---
  # Marqueur consomme par le workflow `liquibase-bootstrap.yml` de clenzy-infra
  # (commande `changelog-sync-to-tag pre-fix-status-constraint`) pour marquer
  # 0109..0112 comme appliques sans executer leur SQL. Sur la prod ces
  # changesets n'ont jamais tourne (Liquibase desactive depuis 0108) mais le
  # schema est deja conforme via Hibernate ddl-auto=update, et 0111 supprimerait
  # les teams configurees a la main si on le rejouait. Ce tag permet d'isoler
  # 0113 dans le step `update` qui suit la synchro.
  - changeSet:
      id: "0112a-tag-pre-fix-status-constraint"
      author: clenzy-team
      changes:
        - tagDatabase:
            tag: pre-fix-status-constraint

  # --- 0113 : Force-rebuild service_requests.status CHECK constraint ---
  # 0064 a ete marque EXECUTED par changelog-sync-to-tag pre-liquibase-baseline
  # (changeset 0107a) sans executer son SQL. La contrainte heritee de Hibernate
  # ddl-auto=update n'accepte ni ASSIGNED ni AWAITING_PAYMENT, ce qui fait
  # exploser tout assign/auto-assign avec DataIntegrityViolationException
  # ("violates check constraint service_requests_status_check"). Ce changeset
  # rejoue 0064 de facon idempotente.
  - changeSet:
      id: "0113-fix-service-request-status-constraint-force"
      author: clenzy-team
      sqlFile:
        path: changes/0113__fix_service_request_status_constraint_force.sql
        relativeToChangelogFile: true

  # --- 0114 : Drop legacy `url` column from property_photos ---
  # Sur la prod, Hibernate ddl-auto=update a cree la table avec une colonne
  # `url VARCHAR NOT NULL` (ancienne entite). La migration 0093 (DROP+CREATE)
  # n'a jamais tourne (Liquibase desactive), donc la colonne legacy reste
  # NOT NULL et tout INSERT photo echoue. DROP COLUMN IF EXISTS est idempotent
  # sur dev/local ou 0093 a recree la table proprement.
  - changeSet:
      id: "0114-drop-legacy-url-from-property-photos"
