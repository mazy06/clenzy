databaseChangeLog:

  # ============================================================================
  # Clenzy — Master Changelog
  # ============================================================================
  # Converti depuis les migrations Flyway V2→V58 (54 changesets).
  # Les fichiers SQL originaux sont conserves dans db/migration/ (archive).
  #
  # Convention pour les nouveaux changesets :
  #   - Fichier : db/changelog/changes/NNNN__description.sql
  #   - ID : NNNN-description (tirets, pas underscores)
  #   - Author : prenom-nom
  #   - Si PL/pgSQL (DO $$) : utiliser splitStatements: false
  #
  # ----------------------------------------------------------------------------
  # POLITIQUE D'EXECUTION (mise a jour 2026-05-23)
  # ----------------------------------------------------------------------------
  # Liquibase s'applique automatiquement au demarrage Spring Boot dans TOUS
  # les environnements (dev, staging, prod) via spring.liquibase.enabled=true.
  # Le plan de reactivation 5 phases est complete.
  #
  # Reglés a respecter quand on ajoute un changeset :
  #   - Eviter les gros changesets data (millions de lignes) → si necessaire,
  #     les pousser via un job dedie post-deploy plutot qu'au boot pour
  #     ne pas allonger le startup du backend.
  #   - Toujours tester en local contre une copie du schema prod avant push.
  #   - Ne JAMAIS modifier un changeset deja applique en prod (le CI le bloque
  #     via le check `immutable-changesets` — bypass `[liquibase-allow-modify]`
  #     dans le titre PR uniquement pour les cas exceptionnels documentes).
  # ============================================================================

  # --- 0000 : Baseline du schema pre-Liquibase (ere Flyway V1 / ddl-auto) ---
  # Le changelog a ete converti depuis Flyway V2 : le schema INITIAL n'existait
  # dans aucun changeset et un replay sur base VIERGE echouait des 0001
  # (relation "users" does not exist). Ce changeset recree ce schema manquant.
  # Precondition : sur tout environnement EXISTANT (table users presente), il
  # est marque MARK_RAN sans rien executer — aucun impact au boot (prod incluse).
  # Il ne s'execute que sur une base vierge (DR, staging neuf, replay de test).
  # Preuve : LiquibaseVirginReplayIT (replay integral 0000->fin + validation
  # Hibernate, et chemin MARK_RAN sur base non vierge).
  - changeSet:
      id: "0000-baseline-schema"
      author: clenzy-team
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: users
      sqlFile:
        path: changes/0000__baseline_schema.sql
        relativeToChangelogFile: true

  # --- 0001 : Add keycloak_id to users (ex V2a) ---
  - changeSet:
      id: "0001-add-keycloak-id-to-users"
      author: clenzy-team
      sqlFile:
        path: changes/0001__add_keycloak_id_to_users.sql
        relativeToChangelogFile: true

