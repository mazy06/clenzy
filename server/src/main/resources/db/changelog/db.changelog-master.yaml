  # --- 0111 : Purge team data after coverage-zone migration incident ---
  # GET /api/teams continues to 500 after 0109/0110 — likely due to incoherent
  # team_coverage_zones rows produced during the partial migration. We wipe
  # all team data so the user can re-create teams cleanly. Service requests
  # assigned to a team are detached (status reverted to PENDING).
  - changeSet:
      id: "0111-purge-team-data"
      author: clenzy-team
      sqlFile:
        path: changes/0111__purge_team_data.sql
        relativeToChangelogFile: true

  # --- 0112 : Brute-force ensure country/city columns via PL/pgSQL ---
  # 0109 + 0110 ont ete enregistrees comme appliquees, mais en prod la colonne
  # `country` reste absente (erreur "column cz1_0.country does not exist" sur
  # /api/teams). On utilise un bloc DO $$ ... $$ avec information_schema pour
  # garantir l'ajout, peu importe l'etat exact qu'ont laisse les migrations
  # precedentes. splitStatements:false est documente dans CLAUDE.md pour les
  # blocs PL/pgSQL.
  - changeSet:
