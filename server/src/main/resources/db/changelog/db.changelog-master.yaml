  # sur la table cible evalue toutes les rangees contre le snapshot pre-INSERT.
  # Si plusieurs users avaient organization_id=X et la table etait vide,
  # ils ont tous ete inseres comme OWNER simultanement (au lieu de 1 OWNER
  # + le reste mappe via UserService.mapUserRoleToOrgRole).
  # Ce changeset detecte les orgs avec >1 OWNER, garde le OWNER canonique
  # (priorite: user.role=HOST, puis joined_at le plus ancien) et remappe
  # les autres selon leur user.role. Idempotent.
