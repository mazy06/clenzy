  # --- 0006 : Refactor users table (ex V8) ---
  # validCheckSum : fichier revise en 2026-07 (chantier 0000-baseline) pour le
  # rendre rejouable sur base vierge (retrait `\d users;`, des DROP de colonnes
  # PII encore portees par l'entite, et du RENAME keycloak_id->external_id —
  # etats historiquement retablis par ddl-auto=update). Deja applique partout
  # via changelog-sync : le nouveau checksum ne doit pas bloquer les boots.
  - changeSet:
      id: "0006-refactor-users-table"
      author: clenzy-team
      validCheckSum: "1:any"
      sqlFile:
        path: changes/0006__refactor_users_table.sql
        relativeToChangelogFile: true

