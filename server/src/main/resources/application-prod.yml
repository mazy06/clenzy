server:
  port: 8080

spring:
  datasource:
    # Read replica routing (Niveau 8) — si REPLICA_URL non defini, fallback vers PRIMARY
    primary:
      url: ${SPRING_DATASOURCE_URL}
      username: ${SPRING_DATASOURCE_USERNAME}
      password: ${SPRING_DATASOURCE_PASSWORD}
    replica:
      url: ${SPRING_DATASOURCE_REPLICA_URL:${SPRING_DATASOURCE_URL}}
      username: ${SPRING_DATASOURCE_REPLICA_USERNAME:${SPRING_DATASOURCE_USERNAME}}
      password: ${SPRING_DATASOURCE_REPLICA_PASSWORD:${SPRING_DATASOURCE_PASSWORD}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Europe/Paris
  liquibase:
    enabled: true
    url: ${SPRING_DATASOURCE_URL}
    user: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jackson:
    time-zone: Europe/Paris
  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:${BREVO_SMTP_USERNAME:}}
    password: ${MAIL_PASSWORD:${BREVO_SMTP_KEY:}}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT_MS:5000}
          timeout: ${MAIL_SMTP_TIMEOUT_MS:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT_MS:5000}
          pool: true
          poolSize: ${MAIL_SMTP_POOL_SIZE:50}
          quitwait: false
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:true}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI}
  data:
    redis:
      password: ${SPRING_REDIS_PASSWORD}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:clenzy-kafka:9092}
    consumer:
      group-id: clenzy-backend
      auto-offset-reset: earliest
    producer:
      acks: all
    # SASL/SCRAM authentication (activate when Kafka broker supports it)
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:SCRAM-SHA-512}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}
    ssl:
      trust-store-location: ${KAFKA_SSL_TRUSTSTORE_LOCATION:}
      trust-store-password: ${KAFKA_SSL_TRUSTSTORE_PASSWORD:}

keycloak:
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL}
  realm: ${KEYCLOAK_REALM:clenzy}
  resource: ${KEYCLOAK_RESOURCE:clenzy-web}
  credentials:
    secret: ${KEYCLOAK_CLIENT_SECRET}

# Airbnb Integration
airbnb:
  api:
    base-url: https://api.airbnb.com/v2
  oauth:
    client-id: ${AIRBNB_CLIENT_ID:}
    client-secret: ${AIRBNB_CLIENT_SECRET:}
    redirect-uri: ${AIRBNB_REDIRECT_URI:}
    authorization-url: https://www.airbnb.com/oauth2/auth
    token-url: https://api.airbnb.com/v2/oauth2/authorizations
    scopes: listings_r,reservations_r,reservations_w,calendar_r,calendar_w,messages_r,messages_w
  webhook:
    secret: ${AIRBNB_WEBHOOK_SECRET:}
  sync:
    enabled: true
    interval-minutes: 15

# Jasypt (chiffrement des tokens en base)
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD}

# Swagger desactive en production
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

cors:
  allowed-origins: ${ALLOWED_ORIGINS}

# Stripe
stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}
  currency: eur

# Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: WHEN_AUTHORIZED
    metrics:
      enabled: true
  health:
    mail:
      enabled: false
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    org.hibernate.SQL: warn
    org.springframework.web: warn
    com.clenzy: info
    org.springframework.security: warn

# Sentry — Error tracking (active uniquement si SENTRY_DSN est defini)
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:production}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.1}
  enable-tracing: true
  send-default-pii: false
  in-app-includes: com.clenzy

clenzy:
  # Twilio — SMS & WhatsApp messaging
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    messaging-service-sid: ${TWILIO_MESSAGING_SERVICE_SID:}
    whatsapp-from: ${TWILIO_WHATSAPP_FROM:}
    verify-service-sid: ${TWILIO_VERIFY_SID:}
  # Nuki — Smart Lock integration
  nuki:
    api-url: ${NUKI_API_URL:https://api.nuki.io}
    client-id: ${NUKI_CLIENT_ID:}
    client-secret: ${NUKI_CLIENT_SECRET:}
  # HubSpot — CRM & Ticketing
  hubspot:
    api-key: ${HUBSPOT_API_KEY:}
    portal-id: ${HUBSPOT_PORTAL_ID:}
  # Signature electronique (Pennylane, extensible DocuSign/Odoo/Custom)
  signature:
    active-provider: ${SIGNATURE_PROVIDER:pennylane}
  pennylane:
    api-url: ${PENNYLANE_API_URL:https://app.pennylane.com/api}
    client-id: ${PENNYLANE_CLIENT_ID:}
    client-secret: ${PENNYLANE_CLIENT_SECRET:}
    redirect-uri: ${PENNYLANE_REDIRECT_URI:}
    authorization-url: ${PENNYLANE_AUTHORIZATION_URL:https://app.pennylane.com/oauth/authorize}
    token-url: ${PENNYLANE_TOKEN_URL:https://app.pennylane.com/oauth/token}
    revoke-url: ${PENNYLANE_REVOKE_URL:https://app.pennylane.com/oauth/revoke}
    scopes: ${PENNYLANE_SCOPES:customer_invoices:all supplier_invoices:all customers:all suppliers:all journals:readonly ledger_accounts:readonly}
    accounting-api-base-url: ${PENNYLANE_ACCOUNTING_API_BASE_URL:https://app.pennylane.com/api/external/v2}
  # Webhooks — Zapier & automation
  webhooks:
    enabled: ${WEBHOOKS_ENABLED:true}
    max-subscriptions-per-org: 20
    retry-attempts: 3
  mapbox:
    access-token: ${MAPBOX_ACCESS_TOKEN:}
  mail:
    provider: ${MAIL_PROVIDER:brevo}
    from: ${MAIL_FROM:info@clenzy.fr}
    notification-to: ${MAIL_NOTIFICATION_TO:info@clenzy.fr}
    contact:
      max-attachments: ${MAIL_MAX_ATTACHMENTS:10}
      max-attachment-size-bytes: ${MAIL_MAX_ATTACHMENT_SIZE_BYTES:10485760}
  imap:
    enabled: ${IMAP_ENABLED:false}
    host: ${IMAP_HOST:mail.clenzy.fr}
    port: ${IMAP_PORT:993}
    username: ${IMAP_USERNAME:info@clenzy.fr}
    password: ${IMAP_PASSWORD:}
  uploads:
    contact-dir: ${CONTACT_UPLOADS_DIR:/app/uploads/contact}
    templates-dir: ${TEMPLATES_DIR:/app/uploads/templates}
    documents-dir: ${DOCUMENTS_DIR:/app/uploads/documents}
  backup:
    dir: ${BACKUP_DIR:/app/backups}
  libreoffice:
    url: ${LIBREOFFICE_URL:http://clenzy-libreoffice:3000}
