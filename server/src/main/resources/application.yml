spring:
  application:
    name: clenzy
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev,local}
  threads:
    virtual:
      enabled: true
  task:
    scheduling:
      pool:
        size: 4          # 1 thread per scheduler (iCal, Noise, Pricing, Messaging)
      thread-name-prefix: sched-
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# Configuration Keycloak
keycloak:
  auth-server-url: http://clenzy-keycloak:8080
  realm: clenzy
  resource: clenzy-web
  credentials:
    secret: ${KEYCLOAK_CLIENT_SECRET:}
  admin:
    username: ${KEYCLOAK_ADMIN_USERNAME}
    password: ${KEYCLOAK_ADMIN_PASSWORD}
    client-id: admin-cli

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: WHEN_AUTHORIZED
  metrics:
    tags:
      application: clenzy

# ─── Resilience4j — Circuit Breakers (Niveau 8 scalabilite) ─────────────────
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
      external-api:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true
      payment:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 30
        waitDurationInOpenState: 120s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      minut-api:
        baseConfig: external-api
      tuya-api:
        baseConfig: external-api
      airbnb-oauth:
        baseConfig: external-api
      stripe-api:
        baseConfig: payment
      gotenberg:
        baseConfig: default
        waitDurationInOpenState: 15s
      ical-import:
        baseConfig: default
        waitDurationInOpenState: 30s
      keycloak-admin:
        baseConfig: external-api
        waitDurationInOpenState: 30s
      email-smtp:
        baseConfig: default
        slidingWindowSize: 20
        failureRateThreshold: 40
        waitDurationInOpenState: 60s
      twilio-api:
        baseConfig: external-api
      nuki-api:
        baseConfig: external-api
      hubspot-api:
        baseConfig: external-api
      pennylane-api:
        baseConfig: external-api
      ai-design:
        baseConfig: external-api
        waitDurationInOpenState: 120s
      ai-pricing:
        baseConfig: external-api
        waitDurationInOpenState: 60s
      ai-messaging:
        baseConfig: external-api
        waitDurationInOpenState: 60s
      ai-analytics:
        baseConfig: external-api
        waitDurationInOpenState: 60s
      ai-sentiment:
        baseConfig: external-api
        waitDurationInOpenState: 60s
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
    instances:
      gotenberg:
        baseConfig: default
        maxAttempts: 2
      email-smtp:
        baseConfig: default
        maxAttempts: 3
      ai-design:
        baseConfig: default
        maxAttempts: 2
        waitDuration: 2s
      ai-pricing:
        baseConfig: default
        maxAttempts: 2
        waitDuration: 2s
      ai-messaging:
        baseConfig: default
        maxAttempts: 2
        waitDuration: 2s
      ai-analytics:
        baseConfig: default
        maxAttempts: 2
        waitDuration: 2s
      ai-sentiment:
        baseConfig: default
        maxAttempts: 2
        waitDuration: 2s

# ─── AI Module ────────────────────────────────────────────────────────────────
clenzy:
  ai:
    enabled: false
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4o
      base-url: https://api.openai.com/v1
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: claude-sonnet-4-20250514
      base-url: https://api.anthropic.com/v1
    bedrock:
      enabled: true
      api-key: ${BEDROCK_API_KEY:}
      model: amazon.nova-lite-v1:0
      base-url: ${BEDROCK_BASE_URL:https://bedrock-mantle.eu-west-1.api.aws/v1}
    website-fetch:
      timeout-seconds: 15
      max-content-length-kb: 512
    token-budget:
      default-monthly-tokens: 100000
      enforced: true
    features:
      pricing-ai: false
      messaging-ai: false
      analytics-ai: false
      sentiment-ai: false

# ─── Firebase Cloud Messaging ─────────────────────────────────────────────────
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

# ─── Module fiscal multi-pays ────────────────────────────────────────────────
fiscal:
  multi-country:
    enabled: false

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  packages-to-scan: com.clenzy.controller
  paths-to-match: /api/**

# ─── KPI SLA Dashboard ────────────────────────────────────────────────────
kpi:
  test-coverage-pct: ${KPI_TEST_COVERAGE_PCT:55.4}
